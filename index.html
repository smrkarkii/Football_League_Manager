<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title></title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <nav class="navbar navbar-expand-sm navbar-dark bg-transparent">
      <a href="#" class="navbar-brand">Football league Manager</a>
      <button class="navbar-toggler" data-toggle="collapse" data-target="#navbarMenu">
          <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarMenu">
          <ul class="navbar-nav">
              <li class="nav-item">
                  <a href="#" class="nav-link">New</a>
              </li>
              <li class="nav-item">
                  <a href="#" class="nav-link">Open</a>
              </li>
              <li class="nav-item">
                <a href="#" class="nav-link">Save</a>
            </li>
            <li class="nav-item">
              <a href="#" class="nav-link">Help</a>
          </li>
          </ul>
      </div>
</nav>
<div class="heading">
  <h1>Create your own league schedules and tables for tournaments.
  </h1>
</div>

<form action="" class="main-form needs-validation" novalidate>
 
      
     
  
  <div class="form-group">
    <h3> POINTS
    </h3>
      <label for="win">For a win </label>
      <input type="text" name="win" id="win" class="form-control">
  </div>
  <div class="form-group">
      <label for="draw">For a draw</label>
      <input type="text" name="draw" id="draw" class="form-control">
  </div>
  <div class="form-group">
    <label for="loss">For a loss </label>
    <input type="text" name="loss" id="loss" class="form-control">
</div>
  <div class="form-group">
      <label for="Team Name">Team Name</label>
      <input type="text" name="Team Name" id="Team name" class="form-control">
  </div>
  
  <div class="form-check">
      <input type="checkbox" id="accept-terms" class="form-check-input">
      <label for="accept-terms" class="form-check-label">Accept Terms &amp; Conditions</label>
  </div>
  <button type="submit" class="btn btn-primary">Generate league Statistics</button>
</form>

<!-- Optional JavaScript; choose one of the two! -->

    <!-- Option 1: Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.min.js" integrity="sha384-QJHtvGhmr9XOIpI6YVutG+2QOK9T+ZnN4kzFN1RtK3zEFEIsxhlmWl5/YESvpZ13" crossorigin="anonymous"></script>
    -->
  </body>
</html>
