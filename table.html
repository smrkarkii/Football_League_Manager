<html>
    <head>
        <title>Add teams</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <!-- Bootstrap CSS -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.0/css/all.css" integrity="sha384-lZN37f5QGtY3VHgisS14W3ExzMWZxybE1SJSEsQp9S+oqd12jhcu+A56Ebc1zFSJ" crossorigin="anonymous">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
      
        <script type = "text/javascript" src="./src/js/array.js" > </script>


         </style>
    </head>
    <body>
      <div class="heading">
          </div>

     
      <table class="table ">
           <tr>
            <th>Teams</th>
            <th>Points</th>
            <th>Played</th>
            <th>WON</th>
            <th>Draw</th>
            <th>Lost</th>
           </tr>
    <tbody id="points-table">
      
    </tbody>

    </table>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

        <script src="lib/jquery/jquery-1.11.3.min.js"></script>
        <script src="lib/bootstrap-3.3.5-dist/js/bootstrap.min.js"></script>
        
    <script defer>
        
            var table = document.getElementById('points-table');
            array=JSON.parse(localStorage.getItem("teams"));
        //     var array=[{name:'smriti', points:'2',won:'2',lost:'3', draw:'2'},
        //     {name:'smriti', points:'2',won:'2',lost:'3', draw:'2'},
        //    {name:'smriti', points:'2',won:'2',lost:'3', draw:'2'}
        // ]
        displayTable(array);
        function displayTable(a){
            for(var i = 0; i<a.length;i++){
               var tr= `<tr>
                    <td>${i+1}</td>
                    <td>${a[i].name}</td>
                    <td>${a[i].points}</td>
                    <td>${a[i].won}</td>
                    <td>${a[i].lost}</td>
                    <td>${a[i].draw}</td>
                  
                </tr>`
                table.innerHTML += tr
            }
         }
    </script> 
    <script src="./js/jquery-1.11.0.min.js"></script>
    <script src="./js/bootstrap.min.js"></script>
    <script src="./js/wow.min.js"></script>  
    </body>
</html>
